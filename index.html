<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Your Library</title>
</head>
<body>
    
    <div class="maincontainer">

        <div class="header">
        <h1>Your Library</h1>
        </div>

        <dialog class="modal">
            <h2>Enter book details:</h2>
            <form action="/" method="post">
                <label for="title">
                    Title:
                    <input type="text" id="title" name="title" minlength="3" maxlength="15" required>
                </label>
                <label for="author">
                    Author:
                    <input type="text" id="author" name="title" minlength="3" maxlength="15" required>
                </label>
                <label for="pages">
                    Pages:
                    <input type="text" id="pages" name="title" minlength="1" maxlength="4" required>
                </label>
                <label for="readstatus">
                    Read Status:
                    <input type="text" id="readstatus" name="title" minlength="3" maxlength="15" required>
                </label>

            </form>
        </dialog>


        <div class="bodycontainer">
            <div class="bookgui">
                <div class="addbook">
                    <button type="submit" class="addbookbutton">

                    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="60" x2="120" y2="60" stroke="white" stroke-width="20"/>
                    <line x1="60" y1="0" x2="60" y2="120" stroke="white" stroke-width="20"/>
                    </svg>

                    </button>
                    
                </div>
                <div class="book">
                    <img src="./img/redbooktransparent.png" alt="">
                    <div class="title">
                        <p>Title: </p>
                    </div>
                    <div class="author">
                        <p>Author: </p>
                    </div>
                    <div class="pages">
                        <p>Pages: </p>
                    </div>
                    <div class="readstatus">
                        <p>Read Status: </p>
                    </div>

                </div>
            </div>



            <div class="sidebar">
                <h2>Bibliometrics</h2>
                <p>Total Books:</p>
                <p>Completed Books:</p>
                <p>Total Pages:</p>
                <p>Pages Read:</p>
            </div>
        </div>

        <div class="footer">
            <p>Copyright © 2026 <a href="https://github.com/Squeshly-Freezed" title="Rob's GitHub">Squeshly-Freezed</a></p>
            <img class="logo" src="./img/squeshly-freezed-v2-transparent.png" alt="Squeshly-Freezed">
        </div>

    </div>

</body>
</html>
