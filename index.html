<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Your Library</title>
</head>
<body>
    
    <div class="maincontainer">

        <div class="header">
        <h1>Your Library</h1>
        </div>



        <dialog class="modal">
            <h2>Add a new book:</h2>
            <form action="/" method="post">
                <label for="title">
                    Title:
                    <input type="text" id="title" name="title" minlength="3" maxlength="15" required>
                </label>
                <br><br>
                <label for="author">
                    Author:
                    <input type="text" id="author" name="author" minlength="3" maxlength="15" required>
                </label>
                <br><br>
                <label for="pages">
                    Pages:
                    <input type="number" id="pages" name="pages" min="1" max="9999" required>
                </label>
                <br><br>
                <label for="readstatus" id="readstatuslabel">
                    Finished reading:
                    <input type="checkbox" id= "readstatus" name="readstatus">
                </label>
                <br><br><br>
                <button class="add" type="submit">Add</button>
                <button class="cancel"type="button">Cancel</button>
            </form>
        </dialog>

        

        <div class="bodycontainer">
            <div class="bookgui">
                <div class="addbook" title="Add Book">
                    <button class="addbookbutton">
                    <div class="svgwrapper">
                    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="60" x2="120" y2="60" stroke="white" stroke-width="20"/>
                    <line x1="60" y1="0" x2="60" y2="120" stroke="white" stroke-width="20"/>
                    </svg>
                    </div>
                    </button>
                </div>
            </div>

            <div class="sidebar">
                <h2>How to use:</h2>
                <p>Add your favorite books<br>with the 'plus' icon.</p>
                <p>For each book you can record<br>important information.</p>
                <br>
                <h2>Bibliometrics:</h2>
                <p>Total Books = x</p>
                <p>Completed Books = x</p>
                <p>Total Pages = x</p>
                <p>Pages Read = x</p>
            </div>
        </div>



        <div class="footer">
            <p>Copyright © 2026 <a href="https://github.com/Squeshly-Freezed" title="Rob's GitHub">Squeshly-Freezed</a></p>
            <img class="logo" src="./img/squeshly-freezed-v2-transparent.png" alt="Squeshly-Freezed">
        </div>

    </div>

</body>
</html>
